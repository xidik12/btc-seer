<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0f0f14" />
    <title>BTC Seer</title>
    <script src="https://telegram.org/js/telegram-web-app.js" async></script>
    <link rel="dns-prefetch" href="https://telegram.org" />
  </head>
  <body class="bg-bg-primary text-text-primary">
    <div id="root">
      <div id="splash" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#0f0f14;gap:20px">
        <!-- BTC icon -->
        <div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#f7931a,#e8820e);display:flex;align-items:center;justify-content:center;animation:splash-pulse 1.8s ease-in-out infinite">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M13.5 3v2h1c2.21 0 4 1.79 4 4 0 1.19-.53 2.26-1.36 3A3.98 3.98 0 0118.5 15c0 2.21-1.79 4-4 4h-1v2h-2v-2h-1v2h-2v-2H7v-2h1V7H7V5h1.5V3h2v2h1V3h2zM10.5 7v4h4a2 2 0 000-4h-4zm0 6v4h4.5a2 2 0 000-4h-4.5z" fill="white"/>
          </svg>
        </div>
        <div style="text-align:center">
          <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:20px;font-weight:700;color:#fff;letter-spacing:0.5px">BTC Seer</div>
          <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:11px;color:#888;margin-top:4px">AI-Powered Bitcoin Intelligence</div>
        </div>
        <!-- Loading bar -->
        <div style="width:120px;height:3px;background:#1a1a24;border-radius:3px;overflow:hidden;margin-top:8px">
          <div style="width:40%;height:100%;background:linear-gradient(90deg,#4a9eff,#7b61ff);border-radius:3px;animation:splash-bar 1.2s ease-in-out infinite"></div>
        </div>
      </div>
      <style>
        @keyframes splash-pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.05);opacity:0.85}}
        @keyframes splash-bar{0%{transform:translateX(-100%)}50%{transform:translateX(150%)}100%{transform:translateX(300%)}}
      </style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
